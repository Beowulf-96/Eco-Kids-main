<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Capivara Recicla</title>
  <style>
    body {
      background: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: monospace;
      color: white;
    }

    #hud {
      font-size: 14px;
      margin-bottom: 8px;
      display: flex;
      gap: 24px;
    }

    canvas {
      border: 3px solid #fff;
      background: #1a1a1a;
      display: block;
    }

    #info {
      margin-top: 8px;
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div id="hud">
    <span>PONTOS: <b id="score">0</b></span>
    <span>VIDAS: <b id="lives">3</b></span>
    <span>TEMPO: <b id="timer">60</b>s</span>
  </div>

  <canvas id="canvas" width="600" height="400"></canvas>

  <div id="info">← → ↑ ↓ MOVER &nbsp;|&nbsp; ESPAÇO = PEGAR / SOLTAR</div>

<script>
// ─────────────────────────────────────────
// CONFIGURAÇÕES GERAIS
// ─────────────────────────────────────────

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const W = 600;  // largura do canvas
const H = 400;  // altura do canvas

// Tipos de lixo e suas cores
const TIPOS = [
  { nome: 'organico', cor: '#4caf50', label: 'ORG' },
  { nome: 'papel',    cor: '#2196f3', label: 'PAP' },
  { nome: 'plastico', cor: '#ff9800', label: 'PLA' },
  { nome: 'vidro',    cor: '#9c27b0', label: 'VID' },
];

// ─────────────────────────────────────────
// ESTADO DO JOGO
// ─────────────────────────────────────────

let pontos = 0;
let vidas = 3;
let tempo = 60;
let rodando = false;

// ─────────────────────────────────────────
// LATAS (ficam nos 4 cantos)
// ─────────────────────────────────────────

const latas = [
  { x: 60,       y: 60,       tipo: TIPOS[0] },
  { x: W - 60,   y: 60,       tipo: TIPOS[1] },
  { x: 60,       y: H - 60,   tipo: TIPOS[2] },
  { x: W - 60,   y: H - 60,   tipo: TIPOS[3] },
];

// ─────────────────────────────────────────
// CAPIVARA (o jogador)
// ─────────────────────────────────────────

const cap = {
  x: W / 2,
  y: H / 2,
  tamanho: 36,
  velocidade: 3,
  carregando: null,  // lixo que está carregando (ou null)
};

// ─────────────────────────────────────────
// LIXOS (aparecem no centro do mapa)
// ─────────────────────────────────────────

let lixos = [];

function spawnLixo() {
  // Cria um lixo aleatório no meio do canvas
  if (lixos.length >= 4) return; // máximo 4 lixos na tela
  lixos.push({
    x: 150 + Math.random() * 300,
    y: 100 + Math.random() * 200,
    tipo: TIPOS[Math.floor(Math.random() * 4)],
    tamanho: 22,
  });
}

// ─────────────────────────────────────────
// TECLAS PRESSIONADAS
// ─────────────────────────────────────────

const teclas = {};
window.addEventListener('keydown', e => {
  teclas[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (rodando) interagir();
    else iniciar();
  }
});
window.addEventListener('keyup', e => { teclas[e.code] = false; });

// ─────────────────────────────────────────
// INTERAÇÃO (pegar ou soltar lixo)
// ─────────────────────────────────────────

function interagir() {
  if (cap.carregando) {
    soltar();
  } else {
    pegar();
  }
}

function pegar() {
  // Procura o lixo mais próximo
  for (let i = 0; i < lixos.length; i++) {
    const lixo = lixos[i];
    const dist = distancia(cap.x, cap.y, lixo.x, lixo.y);
    if (dist < 48) {
      cap.carregando = lixo;        // segura o lixo
      lixos.splice(i, 1);           // remove da lista
      return;
    }
  }
}

function soltar() {
  const lixo = cap.carregando;

  // Verifica se está perto de alguma lata
  for (const lata of latas) {
    const dist = distancia(cap.x, cap.y, lata.x, lata.y);
    if (dist < 52) {
      if (lixo.tipo.nome === lata.tipo.nome) {
        // ACERTOU!
        pontos += 10;
        mostrarMensagem('+10', lata.x, lata.y, '#00ff88');
      } else {
        // ERROU!
        vidas--;
        mostrarMensagem('ERROU!', lata.x, lata.y, '#ff4444');
        if (vidas <= 0) { cap.carregando = null; fimDeJogo(); return; }
      }
      cap.carregando = null;
      atualizarHUD();
      return;
    }
  }

  // Não estava perto de lata — solta no chão
  lixo.x = cap.x + 40;
  lixo.y = cap.y;
  lixos.push(lixo);
  cap.carregando = null;
}

// ─────────────────────────────────────────
// UTILITÁRIO: distância entre dois pontos
// ─────────────────────────────────────────

function distancia(ax, ay, bx, by) {
  return Math.hypot(ax - bx, ay - by);
}

// ─────────────────────────────────────────
// MENSAGEM FLUTUANTE
// ─────────────────────────────────────────

let msg = null;

function mostrarMensagem(texto, x, y, cor) {
  msg = { texto, x, y, cor, vida: 1.0 };
}

// ─────────────────────────────────────────
// ATUALIZAR HUD (pontos, vidas, tempo)
// ─────────────────────────────────────────

function atualizarHUD() {
  document.getElementById('score').textContent = pontos;
  document.getElementById('lives').textContent = vidas;
  document.getElementById('timer').textContent = tempo;
}

// ─────────────────────────────────────────
// INICIAR JOGO
// ─────────────────────────────────────────

function iniciar() {
  pontos = 0; vidas = 3; tempo = 60;
  lixos = []; cap.carregando = null;
  cap.x = W / 2; cap.y = H / 2;
  rodando = true;
  atualizarHUD();

  // Spawn de lixo a cada 2 segundos
  const spawnInterval = setInterval(() => {
    if (!rodando) { clearInterval(spawnInterval); return; }
    spawnLixo();
  }, 2000);

  // Contagem regressiva a cada 1 segundo
  const timerInterval = setInterval(() => {
    if (!rodando) { clearInterval(timerInterval); return; }
    tempo--;
    atualizarHUD();
    if (tempo <= 0) { fimDeJogo(); clearInterval(timerInterval); }
  }, 1000);

  spawnLixo(); spawnLixo();
}

// ─────────────────────────────────────────
// FIM DE JOGO
// ─────────────────────────────────────────

function fimDeJogo() {
  rodando = false;
}

// ─────────────────────────────────────────
// UPDATE: move a capivara
// ─────────────────────────────────────────

function update() {
  if (!rodando) return;

  let mx = 0, my = 0;
  if (teclas['ArrowLeft']  || teclas['KeyA']) mx -= cap.velocidade;
  if (teclas['ArrowRight'] || teclas['KeyD']) mx += cap.velocidade;
  if (teclas['ArrowUp']    || teclas['KeyW']) my -= cap.velocidade;
  if (teclas['ArrowDown']  || teclas['KeyS']) my += cap.velocidade;

  // Diagonal: normaliza para não ir mais rápido
  if (mx !== 0 && my !== 0) { mx *= 0.707; my *= 0.707; }

  // Move e mantém dentro do canvas
  const s = cap.tamanho / 2;
  cap.x = Math.max(s, Math.min(W - s, cap.x + mx));
  cap.y = Math.max(s, Math.min(H - s, cap.y + my));

  // Fade da mensagem flutuante
  if (msg) {
    msg.vida -= 0.02;
    msg.y -= 0.5;
    if (msg.vida <= 0) msg = null;
  }
}

// ─────────────────────────────────────────
// DRAW: desenha tudo no canvas
// ─────────────────────────────────────────

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Fundo
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);

  // Grade decorativa
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Latas
  for (const lata of latas) {
    desenharLata(lata);
  }

  // Lixos no chão
  for (const lixo of lixos) {
    desenharLixo(lixo.x, lixo.y, lixo.tipo, lixo.tamanho);
  }

  // Linha guia se estiver carregando
  if (cap.carregando) {
    const lataCorreta = latas.find(l => l.tipo.nome === cap.carregando.tipo.nome);
    ctx.setLineDash([6, 6]);
    ctx.strokeStyle = cap.carregando.tipo.cor;
    ctx.globalAlpha = 0.3;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cap.x, cap.y); ctx.lineTo(lataCorreta.x, lataCorreta.y); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha = 1;
  }

  // Capivara
  desenharCapivara();

  // Lixo carregado (acima da capivara)
  if (cap.carregando) {
    desenharLixo(cap.x, cap.y - cap.tamanho / 2 - 16, cap.carregando.tipo, 18);
  }

  // Mensagem flutuante
  if (msg) {
    ctx.globalAlpha = msg.vida;
    ctx.fillStyle = msg.cor;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(msg.texto, msg.x, msg.y);
    ctx.globalAlpha = 1;
  }

  // Tela de início ou fim
  if (!rodando) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    if (tempo <= 0 || vidas <= 0) {
      ctx.fillText('FIM DE JOGO!', W / 2, H / 2 - 20);
      ctx.font = '13px monospace';
      ctx.fillText('Pontos: ' + pontos, W / 2, H / 2 + 10);
    } else {
      ctx.fillText('🦫 CAPIVARA RECICLA', W / 2, H / 2 - 20);
    }
    ctx.font = '11px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Pressione ESPAÇO para jogar', W / 2, H / 2 + 40);
  }
}

// ─────────────────────────────────────────
// DESENHAR LATA
// ─────────────────────────────────────────

function desenharLata(lata) {
  const s = 44;
  const x = lata.x - s / 2;
  const y = lata.y - s / 2;

  // Sombra
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x + 4, y + 4, s, s);

  // Corpo da lata
  ctx.fillStyle = lata.tipo.cor;
  ctx.fillRect(x, y, s, s);

  // Borda
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, s, s);

  // Label
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(lata.tipo.label, lata.x, lata.y);
  ctx.textBaseline = 'alphabetic';
}

// ─────────────────────────────────────────
// DESENHAR LIXO
// ─────────────────────────────────────────

function desenharLixo(x, y, tipo, tamanho) {
  const s = tamanho;
  ctx.fillStyle = tipo.cor;
  ctx.fillRect(x - s / 2, y - s / 2, s, s);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x - s / 2, y - s / 2, s, s);
}

// ─────────────────────────────────────────
// DESENHAR CAPIVARA (simples, mas reconhecível)
// ─────────────────────────────────────────

function desenharCapivara() {
  const x = cap.x;
  const y = cap.y;
  const s = cap.tamanho;

  // Corpo (retângulo marrom)
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(x - s / 2, y - s / 2, s, s);

  // Nariz (círculo escuro)
  ctx.fillStyle = '#5a3a1a';
  ctx.beginPath();
  ctx.arc(x + s * 0.2, y - s * 0.05, 5, 0, Math.PI * 2);
  ctx.fill();

  // Olho
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x + s * 0.1, y - s * 0.25, 3, 0, Math.PI * 2);
  ctx.fill();

  // Orelha
  ctx.fillStyle = '#6b4a22';
  ctx.fillRect(x - s * 0.4, y - s * 0.5 - 8, 10, 8);
}

// ─────────────────────────────────────────
// LOOP PRINCIPAL
// ─────────────────────────────────────────

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);  // repete ~60x por segundo
}

loop(); // inicia o loop
</script>
</body>
</html>
